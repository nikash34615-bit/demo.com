<!DOCTYPE html>
<html>

<head>

<title>Second Page</title>

<style>

body{

  background: black;

  color: white;

  text-align: center;

  font-family: Arial;

  padding-top: 120px;

}

h1{

  color: cyan;

  font-size: 60px;

  animation: glow 2s infinite alternate;

}

p{

  font-size: 25px;

  margin-top: 20px;

  line-height: 40px;

}

button{

  background: cyan;

  color: black;

  border: none;

  padding: 15px 40px;

  font-size: 20px;

  border-radius: 10px;

  cursor: pointer;

  transition: 0.3s;

}

button:hover{

  background: white;

  transform: scale(1.1);

}

@keyframes glow{

  from{
    text-shadow: 0 0 10px cyan;
  }

  to{
    text-shadow:
    0 0 20px cyan,
    0 0 40px cyan;
  }

}

</style>

</head>

<body>

<h1>Welcome Nikash 😎🔥</h1>

<p>
You successfully opened the second page 🚀
</p>

<button onclick="window.location.href='index.html'">

GO BACK

</button>

</body>

</html>
